<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT・建築用語タイピング</title>
    <style>
        /* ココアさんの元のデザイン・カラーを完全継承 */
        body {
            background-color: #1e272e;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            color: #333;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto 20px auto;
        }
        h1 { color: #2980b9; font-size: 22px; margin-bottom: 10px; }
        .timer-box { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #e74c3c; }
        .word-display { font-size: 36px; font-weight: bold; color: #2c3e50; letter-spacing: 2px; margin: 20px 0; background: #ecf0f1; padding: 10px; border-radius: 10px; }
        #type-input { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 25px; font-size: 16px; text-align: center; outline: none; box-sizing: border-box; }
        #type-input:focus { border-color: #2980b9; }
        .score-display { font-size: 18px; font-weight: bold; margin-top: 15px; color: #2ecc71; }
        #start-btn, #copy-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 25px; border: none; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: background 0.2s; }
        #start-btn { background-color: #2980b9; color: white; }
        #start-btn:hover { background-color: #3498db; }
        #copy-btn { background-color: #1da1f2; color: white; display: none; }
        #copy-btn:hover { background-color: #4ab3f4; }
        .ad-space-box { width: 100%; max-width: 440px; background-color: #2c3e50; border: 2px dashed #4b6584; border-radius: 12px; padding: 15px; text-align: center; color: #a4b0be; margin-bottom: 20px; box-sizing: border-box; }
        .ad-label { font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IT・建築用語タイピング</h1>
        <div id="status" style="color: #7f8c8d; font-size: 13px; margin-bottom: 10px;">スタートを押してタイピング開始！</div>

        <div class="timer-box">残り時間: <span id="time-left">60</span>秒</div>
        <div class="word-display" id="word-target">CAD</div>
        <input type="text" id="type-input" placeholder="ここに入力してね" disabled autocomplete="off">
        <div class="score-display">スコア: <span id="score">0</span> 点</div>

        <button id="start-btn">ゲームスタート！🎮</button>
        <button id="copy-btn">最高スコアをコピーしてXで自慢する 📋</button>
    </div>

    <!-- 将来の広告枠 -->
    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <!-- 🛠️ ココアさんの本物のURL（https://x.com）へ完全直行する安全な看板リンク -->
    <div class="footer-link" style="text-align: center; margin-top: 10px; font-size: 12px;">
      開発者：<a href="https://x.com" target="_blank" rel="noopener noreferrer" style="color: #3498db; text-decoration: none; font-weight: bold;">ココア (@cocoa_next7)</a>
    </div>

    <script>
        const words = ["CAD", "VERCEL", "GITHUB", "HTML", "CSS", "JAVASCRIPT", "COCOA", "LAPTOP", "CODE", "PRO", "GAMINGPC", "JWS", "SERVER"];
        
        let score = 0;
        let timeLeft = 60;
        let isPlaying = false;
        let timerId = null;
        let currentWord = "";
        let shareText = "";

        const wordTarget = document.getElementById("word-target");
        const typeInput = document.getElementById("type-input");
        const timeLeftText = document.getElementById("time-left");
        const scoreText = document.getElementById("score");
        const startBtn = document.getElementById("start-btn");
        const copyBtn = document.getElementById("copy-btn");
        const statusText = document.getElementById("status");

        function setNextWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordTarget.textContent = currentWord;
            typeInput.value = ""; 
        }

        startBtn.addEventListener("click", () => {
            score = 0;
            timeLeft = 60;
            isPlaying = true;
            scoreText.textContent = score;
            timeLeftText.textContent = timeLeft;
            startBtn.style.display = "none";
            copyBtn.style.display = "none";
            typeInput.disabled = false;
            typeInput.focus();
            statusText.textContent = "大文字で入力してね！";

            setNextWord();

            timerId = setInterval(() => {
                timeLeft--;
                timeLeftText.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    endGame();
                }
            }, 1000);
        });

        typeInput.addEventListener("input", () => {
            if (!isPlaying) return;

            if (typeInput.value.toUpperCase() === currentWord) {
                score += 10; 
                scoreText.textContent = score;
                setNextWord(); 
            }
        });

        function endGame() {
            isPlaying = false;
            typeInput.disabled = true;
            startBtn.style.display = "block";
            startBtn.textContent = "もう一度挑戦する！🔄";
            statusText.textContent = "タイムアップ！お疲れ様でした！";
            
            // 【URL固定】X上で他のユーザーがココアさんのアカウントを見つけやすいよう文言に組み込み
            shareText = `ココアのスピードタイピングゲームに挑戦！1分間で【スコア：${score}点】を叩き出しました！開発者：@cocoa_next7 アプデ後もURLは一生同じ！ #ココアのタイピングゲーム`;
            copyBtn.style.display = "block";
        }

        // コピーと同時にココアさんの本物のアカウント宛てに共有画面を開く最速ジャンプ処理
        copyBtn.addEventListener("click", () => {
            if (!shareText) return;
            navigator.clipboard.writeText(shareText).then(() => {
                copyBtn.textContent = "スコアコピー完了！Xへ移動します...💨";
                copyBtn.style.backgroundColor = "#2ed573";
                
                // ココアさんの本物のURLにインテントを完全紐付け
                const xUrl = `https://x.com{encodeURIComponent(shareText)}`;
                
                setTimeout(() => {
                    window.open(xUrl, '_blank', 'noopener,noreferrer');
                    copyBtn.textContent = "最高スコアをコピーしてXで自慢する 📋";
                    copyBtn.style.backgroundColor = "#1da1f2";
                }, 800);
            }).catch(() => {
                alert("コピーに失敗しました。");
            });
        });
    </script>
</body>
</html>
