<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココアのスピードタイピング！ミニゲーム</title>
    <style>
        body {
            background-color: #1e272e;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: #2f3640;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #00d2d3;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .timer-box {
            font-size: 20px;
            color: #ff4757;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .word-display {
            font-size: 36px;
            font-weight: bold;
            color: #fbc531;
            background-color: #353b48;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
        }

        #type-input {
            width: 100%;
            padding: 12px 20px;
            border: 3px solid #718093;
            border-radius: 25px;
            font-size: 18px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background-color: white;
            color: #2f3640;
            margin-bottom: 15px;
        }
        #type-input:focus { border-color: #00d2d3; }
        #type-input:disabled { background-color: #718093; cursor: not-allowed; }

        .score-display {
            color: #4cd137;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #start-btn {
            background-color: #00d2d3;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,210,211,0.3);
        }
        #start-btn:hover { background-color: #00a8ff; }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: none; 
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #353b48;
            border: 2px dashed #718093;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .ad-label { font-size: 11px; font-weight: bold; color: #718093; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #718093; line-height: 1.4; }
    </style>
</head>
    <!-- 【開発者看板リンク】これを追加するだけで自動でXに繋がります -->
    <div style="text-align: center; margin-top: 20px;">
        <a href="https://x.com/cocoa_next7" target="_blank" style="font-size: 12px; color: #3498db; text-decoration: none; font-weight: bold;">
            🛠️ 開発者：ココア (プロのフリーランスへの成長記録はコチラ) 🛠️
        </a>
    </div>

    <body>

    <div class="container">
        <h1>IT・建築用語タイピング</h1>
        <div id="status" style="color: #a4b0be; font-size: 13px; margin-bottom: 10px;">スタートを押してタイピング開始！</div>

        <!-- 【時間修正】初期表示を60秒に変更 -->
        <div class="timer-box">残り時間: <span id="time-left">60</span>秒</div>

        <div class="word-display" id="word-target">CAD</div>

        <input type="text" id="type-input" placeholder="ここに入力してね" disabled autocomplete="off">

        <div class="score-display">スコア: <span id="score">0</span> 点</div>

        <button id="start-btn">ゲームスタート！🎮</button>
        <button id="copy-btn">最高スコアをコピーしてXで自慢する 📋</button>
    </div>

    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <script>
        const words = ["CAD", "VERCEL", "GITHUB", "HTML", "CSS", "JAVASCRIPT", "COCOA", "LAPTOP", "CODE", "PRO", "GAMINGPC", "JWS", "SERVER"];
        
        let score = 0;
        // 【時間修正】1分（60秒）に延長！
        let timeLeft = 60;
        let isPlaying = false;
        let timerId = null;
        let currentWord = "";
        let shareText = ""; // コピーする文章を保存するグローバル変数

        const wordTarget = document.getElementById("word-target");
        const typeInput = document.getElementById("type-input");
        const timeLeftText = document.getElementById("time-left");
        const scoreText = document.getElementById("score");
        const startBtn = document.getElementById("start-btn");
        const copyBtn = document.getElementById("copy-btn");
        const statusText = document.getElementById("status");

        function setNextWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordTarget.textContent = currentWord;
            typeInput.value = ""; 
        }

        startBtn.addEventListener("click", () => {
            score = 0;
            // 【時間修正】スタート時も60秒にリセット
            timeLeft = 60;
            isPlaying = true;
            scoreText.textContent = score;
            timeLeftText.textContent = timeLeft;
            startBtn.style.display = "none";
            copyBtn.style.display = "none";
            typeInput.disabled = false;
            typeInput.focus();
            statusText.textContent = "大文字で入力してね！";

            setNextWord();

            timerId = setInterval(() => {
                timeLeft--;
                timeLeftText.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    endGame();
                }
            }, 1000);
        });

        typeInput.addEventListener("input", () => {
            if (!isPlaying) return;

            if (typeInput.value.toUpperCase() === currentWord) {
                score += 10; 
                scoreText.textContent = score;
                setNextWord(); 
            }
        });

        function endGame() {
            isPlaying = false;
            typeInput.disabled = true;
            startBtn.style.display = "block";
            startBtn.textContent = "もう一度挑戦する！🔄";
            statusText.textContent = "タイムアップ！お疲れ様でした！";
            
            // 【バグ修正】ゲーム終了時に、確定したスコアを使って正しい文章をセットします！
            shareText = `ココアのスピードタイピングゲームに挑戦！1分間で【スコア：${score}点】を叩き出しました！ゲーミングPCのタイピング速度なら負けません！ #ココアのタイピングゲーム`;
            
            copyBtn.style.display = "block";
        }

        // コピーと同時にXを開く安全な処理
        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(shareText).then(() => {
                copyBtn.textContent = "スコアコピー完了！Xへ移動します...💨";
                copyBtn.style.backgroundColor = "#2ed573";
                
                setTimeout(() => {
                    window.open("https://x.com", "_blank");
                    copyBtn.textContent = "最高スコアをコピーしてXで自慢する 📋";
                    copyBtn.style.backgroundColor = "#1da1f2";
                }, 1000);
            }).catch(err => {
                alert("コピーに失敗しました。");
            });
        });
    </script>
</body>
