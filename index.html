<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココアのスピードタイピング！ミニゲーム</title>
    <style>
        body {
            background-color: #1e272e;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: #2f3640;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #00d2d3;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .timer-box {
            font-size: 20px;
            color: #ff4757;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* お題の文字を表示するエリア */
        .word-display {
            font-size: 36px;
            font-weight: bold;
            color: #fbc531;
            background-color: #353b48;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 入力フォーム */
        #type-input {
            width: 100%;
            padding: 12px 20px;
            border: 3px solid #718093;
            border-radius: 25px;
            font-size: 18px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background-color: white;
            color: #2f3640;
            margin-bottom: 15px;
        }
        #type-input:focus { border-color: #00d2d3; }
        #type-input:disabled { background-color: #718093; cursor: not-allowed; }

        .score-display {
            color: #4cd137;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #start-btn {
            background-color: #00d2d3;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,210,211,0.3);
        }
        #start-btn:hover { background-color: #00a8ff; }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            display: none; /* ゲーム終了まで隠す */
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #353b48;
            border: 2px dashed #718093;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .ad-label { font-size: 11px; font-weight: bold; color: #718093; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #718093; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IT・建築用語タイピング</h1>
        <div id="status" style="color: #a4b0be; font-size: 13px; margin-bottom: 10px;">スタートを押してタイピング開始！</div>

        <div class="timer-box">残り時間: <span id="time-left">10</span>秒</div>

        <!-- お題表示 -->
        <div class="word-display" id="word-target">CAD</div>

        <!-- 入力欄 -->
        <input type="text" id="type-input" placeholder="ここに入力してね" disabled autocomplete="off">

        <div class="score-display">スコア: <span id="score">0</span> 点</div>

        <button id="start-btn">ゲームスタート！🎮</button>
        <button id="copy-btn">最高スコアをコピーしてXで自慢する 📋</button>
    </div>

    <!-- 広告枠 -->
    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <script>
        // ゲームに出てくる単語リスト（ココアさんに関連するIT・建築用語）
        const words = ["CAD", "VERCEL", "GITHUB", "HTML", "CSS", "JAVASCRIPT", "COCOA", "LAPTOP", "CODE", "PRO", "GAMINGPC", "JWS", "SERVER"];
        
        let score = 0;
        let timeLeft = 10;
        let isPlaying = false;
        let timerId = null;
        let currentWord = "";

        const wordTarget = document.getElementById("word-target");
        const typeInput = document.getElementById("type-input");
        const timeLeftText = document.getElementById("time-left");
        const scoreText = document.getElementById("score");
        const startBtn = document.getElementById("start-btn");
        const copyBtn = document.getElementById("copy-btn");
        const statusText = document.getElementById("status");

        // ランダムにお題をセットする関数
        function setNextWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            currentWord = words[randomIndex];
            wordTarget.textContent = currentWord;
            typeInput.value = ""; // 入力欄をクリア
        }

        // ゲームスタートボタンを押したとき
        startBtn.addEventListener("click", () => {
            score = 0;
            timeLeft = 10;
            isPlaying = true;
            scoreText.textContent = score;
            timeLeftText.textContent = timeLeft;
            startBtn.style.display = "none";
            copyBtn.style.display = "none";
            typeInput.disabled = false;
            typeInput.focus();
            statusText.textContent = "大文字で入力してね！";

            setNextWord();

            // 1秒ごとに実行するカウントダウンタイマー
            timerId = setInterval(() => {
                timeLeft--;
                timeLeftText.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    endGame();
                }
            }, 1000);
        });

        // 【今回の最重要スキル：キーボード入力の検知】
        typeInput.addEventListener("input", () => {
            if (!isPlaying) return;

            // 入力された文字をすべて「大文字」に変換して、お題と一致しているか判定
            if (typeInput.value.toUpperCase() === currentWord) {
                score += 10; // 10点プラス
                scoreText.textContent = score;
                setNextWord(); // 次の単語へ
            }
        });

        // ゲーム終了処理
        function endGame() {
            isPlaying = false;
            typeInput.disabled = true;
            startBtn.style.display = "block";
            startBtn.textContent = "もう一度挑戦する！🔄";
            statusText.textContent = "タイムアップ！お疲れ様でした！";
            copyBtn.style.display = "block";
        }

        // 絶対にブロックされないコピー報告ボタン
        copyBtn.addEventListener("click", () => {
            const message = `ココアのスピードタイピングゲームに挑戦！10秒間で【スコア：${score}点】を叩き出しました！ゲーミングPCのタイピング速度なら負けません！ #ココアのタイピングゲーム`;
            
            navigator.clipboard.writeText(message).then(() => {
                copyBtn.textContent = "スコアコピー完了！そのままXに貼り付けられます！ ✅";
                copyBtn.style.backgroundColor = "#2ed573";
                setTimeout(() => {
                    copyBtn.textContent = "最高スコアをコピーしてXで自慢する 📋";
                    copyBtn.style.backgroundColor = "#1da1f2";
                }, 2000);
            });
        });
    </script>
</body>
</html>
